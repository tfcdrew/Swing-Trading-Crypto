<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:46px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}

.live-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:500}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tb-right{display:flex;align-items:center;gap:10px}
#upd{font-size:11px;color:var(--text3);font-family:var(--mono)}
.btn{font-size:11px;font-weight:500;padding:5px 12px;border:1px solid var(--border2);border-radius:3px;background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--blue)}
.ctrlbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:5px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.cg{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;font-size:10px;color:var(--text2)}
.cg input[type=range]{width:60px;accent-color:var(--blue);cursor:pointer}
.cg .val{font-size:10px;font-weight:600;color:var(--text);min-width:28px;font-family:var(--mono)}

.banners{padding:0 16px}

.conf-row{display:flex;align-items:center;gap:7px}
.conf-label{font-size:9px;color:var(--text3);letter-spacing:.06em;font-weight:500;min-width:58px}
.conf-dots{display:flex;gap:3px}
.conf-dot{width:8px;height:8px;border-radius:2px;background:var(--bg4);border:1px solid var(--border2)}
.conf-dot.lit-buy{background:var(--green);border-color:var(--green2)}
.conf-dot.lit-sell{background:var(--red);border-color:var(--red2)}
.conf-dot.lit-warn{background:var(--amber);border-color:var(--amber)}
.conf-text{font-size:9px;color:var(--text2);font-family:var(--mono)}
.sigs-row{font-size:10px;color:var(--text2);font-family:var(--mono)}
.sigs-row.active-buy{color:var(--green)}.sigs-row.active-sell{color:var(--red)}
.td9-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;font-family:var(--mono)}
.td9-buy{background:rgba(38,166,154,.2);color:var(--green);border:1px solid rgba(38,166,154,.4)}
.td9-sell{background:rgba(239,83,80,.2);color:var(--red);border:1px solid rgba(239,83,80,.4)}
.td9-none{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.bottom{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px}
.log-header{font-size:10px;color:var(--text3);letter-spacing:.1em;font-weight:600;margin-bottom:8px}
.log-table{width:100%;border-collapse:collapse}
.log-table td{font-size:11px;font-family:var(--mono);padding:3px 8px 3px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.log-table td:first-child{color:var(--text3);width:72px}
.log-table tr.sig td{color:var(--green)}

<script>
const BASE  = 'https://api.exchange.coinbase.com';
const PAIRS = [{id:'BTC-USD',label:'BTC/USD'},{id:'ETH-USD',label:'ETH/USD'}];
const FIBS_RET = [0,0.236,0.382,0.5,0.618,0.786,1];
const FIBS_EXT = [1.272,1.414,1.618];
let state={}, charts={}, subcharts={}, logs=[];

const ts   = ()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fmt  = v=>v>=1000?v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):v.toFixed(2);
const fmtK = v=>v>=1000?'$'+Math.round(v).toLocaleString():'$'+v.toFixed(0);

function showErr(msg){const el=document.getElementById('err');el.style.display=msg?'block':'none';if(msg)el.textContent='⚠ '+msg;}

/* ── RSI ── */
function calcRSI(c,p=14){
  if(c.length<p+1)return null;
  let g=0,l=0;
  for(let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d);}
  return l===0?100:100-100/(1+g/l);
}

/* ── BOLLINGER BANDS ── */
function calcBB(c,p=20,m=2){
  if(c.length<p)return null;
  const sl=c.slice(-p),mn=sl.reduce((a,b)=>a+b,0)/p;
  const sd=Math.sqrt(sl.map(x=>(x-mn)**2).reduce((a,b)=>a+b,0)/p);
  return{upper:mn+m*sd,lower:mn-m*sd,mid:mn};
}

/* ── MACD 12/26/9 ── */
function calcEMA(c,p){
  if(c.length<p)return[];
  const k=2/(p+1);
  const emas=[c.slice(0,p).reduce((a,b)=>a+b,0)/p];
  for(let i=p;i<c.length;i++)emas.push(c[i]*k+emas[emas.length-1]*(1-k));
  return emas;
}
function calcMACD(c){
  if(c.length<35)return null;
  const ema12=calcEMA(c,12),ema26=calcEMA(c,26);
  const off=ema12.length-ema26.length;
  const macdLine=ema26.map((_,i)=>ema12[i+off]-ema26[i]);
  const signal=calcEMA(macdLine,9);
  const sOff=macdLine.length-signal.length;
  const hist=signal.map((_,i)=>macdLine[i+sOff]-signal[i]);
  const cur=hist[hist.length-1],prev=hist[hist.length-2];
  const mc=macdLine[macdLine.length-1],sc=signal[signal.length-1];
  const mp=macdLine[macdLine.length-2]||0,sp=signal[signal.length-2]||0;
  return{
    hist,macdLine,signal,histCur:cur,histPrev:prev,macdCur:mc,sigCur:sc,
    bullCross:mc>sc&&mp<=sp,
    bearCross:mc<sc&&mp>=sp,
    bullish:mc>sc,
    histRising:cur>prev
  };
}

/* ── STOCHASTIC %K/%D 14,3 ── */
function calcStoch(ohlc,kp=14,dp=3){
  if(ohlc.length<kp)return null;
  const kArr=[];
  for(let i=kp-1;i<ohlc.length;i++){
    const sl=ohlc.slice(i-kp+1,i+1);
    const hi=Math.max(...sl.map(c=>c[2])),lo=Math.min(...sl.map(c=>c[3]));
    kArr.push(hi===lo?50:((ohlc[i][4]-lo)/(hi-lo))*100);
  }
  const dArr=[];
  for(let i=dp-1;i<kArr.length;i++)dArr.push(kArr.slice(i-dp+1,i+1).reduce((a,b)=>a+b,0)/dp);
  const kCur=kArr[kArr.length-1],dCur=dArr[dArr.length-1];
  const kPrev=kArr[kArr.length-2]||kCur,dPrev=dArr[dArr.length-2]||dCur;
  return{
    kArr,dArr,kCur,dCur,
    bullCross:kCur>dCur&&kPrev<=dPrev,
    bearCross:kCur<dCur&&kPrev>=dPrev
  };
}

/* ── TD SEQUENTIAL (9-count setup) ── */
function calcTDSeq(c){
  if(c.length<13)return{buySetup:false,sellSetup:false,curCount:0,curType:'none',counts:[]};
  let buyCount=0,sellCount=0,bActive=false,sActive=false;
  const counts=Array(c.length).fill(null);
  for(let i=4;i<c.length;i++){
    const cl=c[i],p4=c[i-4];
    if(cl<p4){
      if(!bActive){buyCount=1;bActive=true;sActive=false;sellCount=0;}
      else buyCount++;
      if(buyCount<=9){counts[i]={type:'buy',n:buyCount};}
      if(buyCount===9){bActive=false;buyCount=0;}
    } else if(cl>p4){
      if(!sActive){sellCount=1;sActive=true;bActive=false;buyCount=0;}
      else sellCount++;
      if(sellCount<=9){counts[i]={type:'sell',n:sellCount};}
      if(sellCount===9){sActive=false;sellCount=0;}
    }
  }
  // Check last few bars for completed setup
  let buySetup=false,sellSetup=false;
  for(let i=counts.length-1;i>=Math.max(0,counts.length-3);i--){
    if(counts[i]&&counts[i].n===9){
      if(counts[i].type==='buy')buySetup=true;
      if(counts[i].type==='sell')sellSetup=true;
    }
  }
  const last=counts[counts.length-1];
  return{buySetup,sellSetup,curCount:last?last.n:0,curType:last?last.type:'none',counts};
}

/* ── FIBONACCI retracements + extensions ── */
function calcFib(c,lb=60){
  const sl=c.slice(-Math.min(lb,c.length));
  const hi=Math.max(...sl),lo=Math.min(...sl),rng=hi-lo;
  const ret={},ext={};
  FIBS_RET.forEach(f=>{ret[f]=lo+rng*(1-f);});
  FIBS_EXT.forEach(f=>{ext[f]=lo+rng*f;});
  return{hi,lo,rng,ret,ext};
}
function nearLevel(price,lvl,tol=0.009){return Math.abs(price-lvl)/price<tol;}

/* ── ELLIOTT WAVE ── */
function findPivots(c,w=3){
  const hi=[],lo=[];
  for(let i=w;i<c.length-w;i++){
    const sl=c.slice(i-w,i+w+1);
    if(c[i]===Math.max(...sl))hi.push({i,v:c[i]});
    if(c[i]===Math.min(...sl))lo.push({i,v:c[i]});
  }
  return{hi,lo};
}
function estimateEW(c,lb=40){
  const r=c.slice(-Math.min(lb,c.length));
  if(r.length<15)return{wave:'?',label:'Counting...',confidence:'low'};
  const{hi,lo}=findPivots(r,3);
  if(hi.length<2||lo.length<2)return{wave:'?',label:'Counting...',confidence:'low'};
  const lh=hi[hi.length-1],ph=hi[hi.length-2],ll=lo[lo.length-1];
  const cur=r[r.length-1],rhi=Math.max(...r),rlo=Math.min(...r),rng=rhi-rlo;
  if(rng===0)return{wave:'?',label:'Counting...',confidence:'low'};
  const pos=(cur-rlo)/rng;
  const rs=(r[r.length-1]-r[Math.max(0,r.length-6)])/5;
  const ms=r.length>20?(r[r.length-10]-r[r.length-20])/10:0;
  if(ll.i>lh.i&&pos<0.35&&rs>0)return{wave:'2',label:'Wave 2 — buy zone',confidence:'moderate',buySignal:true};
  if(lh.i>ll.i&&lh.v>ph.v&&pos>0.5&&rs>0&&ms>0)return{wave:'3',label:'Wave 3 — impulse',confidence:'moderate'};
  if(ll.i>lh.i&&pos>0.3&&pos<0.6&&Math.abs(rs)<Math.abs(ms)*.5)return{wave:'4',label:'Wave 4 — pullback',confidence:'low'};
  if(lh.i>ll.i&&pos>0.75&&lh.v>ph.v&&rs<ms*.5&&rs>0)return{wave:'5',label:'Wave 5 — exhaustion',confidence:'moderate',warnSignal:true};
  return{wave:'?',label:'Counting...',confidence:'low'};
}

/* ── SIGNAL SCORING (7 possible) ── */
function scoreBuy(s,rsiB,stochB){
  const h=[];
  if(s.rsi!=null&&s.rsi<rsiB)                                      h.push(`RSI ${s.rsi.toFixed(1)}`);
  if(s.bb&&s.price<=s.bb.lower*1.002)                               h.push('BB lower');
  if(s.ew&&s.ew.buySignal)                                           h.push('EW W2');
  if(s.fib){const n=FIBS_RET.filter(f=>f>=0.618&&nearLevel(s.price,s.fib.ret[f]));if(n.length)h.push(`Fib ${n[0].toFixed(3)}`);}
  if(s.macd&&(s.macd.bullCross||(s.macd.bullish&&s.macd.histRising))) h.push('MACD↑');
  if(s.stoch&&s.stoch.kCur<stochB&&s.stoch.bullCross)                h.push('Stoch X↑');
  if(s.td&&s.td.buySetup)                                            h.push('TD9 Buy');
  return h;
}
function scoreSell(s,rsiS,stochS){
  const h=[];
  if(s.rsi!=null&&s.rsi>rsiS)                                         h.push(`RSI ${s.rsi.toFixed(1)}`);
  if(s.bb&&s.price>=s.bb.upper*.998)                                   h.push('BB upper');
  if(s.ew&&s.ew.warnSignal)                                             h.push('EW W5');
  if(s.fib){
    const n=FIBS_RET.filter(f=>f<=0.382&&nearLevel(s.price,s.fib.ret[f]));if(n.length)h.push(`Fib ret ${n[0].toFixed(3)}`);
    const e=FIBS_EXT.filter(f=>nearLevel(s.price,s.fib.ext[f]));if(e.length)h.push(`Fib ext ${e[0].toFixed(3)}`);
  }
  if(s.macd&&(s.macd.bearCross||(!s.macd.bullish&&!s.macd.histRising))) h.push('MACD↓');
  if(s.stoch&&s.stoch.kCur>stochS&&s.stoch.bearCross)                   h.push('Stoch X↓');
  if(s.td&&s.td.sellSetup)                                               h.push('TD9 Sell');
  return h;
}

/* ── EVALUATE ── */
function evaluate(){
  const rsiB  =parseFloat(document.getElementById('rsi-b').value);
  const rsiS  =parseFloat(document.getElementById('rsi-s').value);
  const stochB=parseFloat(document.getElementById('stoch-b').value);
  const stochS=parseFloat(document.getElementById('stoch-s').value);
  const bbM   =parseFloat(document.getElementById('bb-t').value);
  const confT =parseInt(document.getElementById('conf-t').value);
  const ewLB  =parseInt(document.getElementById('ew-t').value);
  const buys=[],sells=[],warns=[];

  PAIRS.forEach(({id,label})=>{
    const s=state[id];
    if(!s||!s.closes||s.closes.length<40)return;
    s.bb    =calcBB(s.closes,20,bbM);
    s.rsi   =calcRSI(s.closes);
    s.macd  =calcMACD(s.closes);
    s.stoch =calcStoch(s.ohlc);
    s.td    =calcTDSeq(s.closes);
    s.ew    =estimateEW(s.closes,ewLB);
    s.fib   =calcFib(s.closes,60);
    s.buyHits =scoreBuy(s,rsiB,stochB);
    s.sellHits=scoreSell(s,rsiS,stochS);
    s.anyBuy  =s.buyHits.length>=confT;
    s.anySell =s.sellHits.length>=confT;
    s.anyWarn =!!(s.ew&&s.ew.warnSignal&&!s.anySell&&s.sellHits.length>=1);
    if(s.anyBuy)  buys.push({label,hits:s.buyHits,price:s.price});
    if(s.anySell) sells.push({label,hits:s.sellHits,price:s.price});
    if(s.anyWarn) warns.push(label);
    renderPanel(id,label);
  });

  function setBanner(elId,cls,txt,subj,body){
    const el=document.getElementById(elId);
    if(txt){el.className='banner '+cls;el.innerHTML=txt+'<br><a class="ebtn" href="mailto:?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body)+'">✉ Open email alert</a>';}
    else el.className='banner';
  }
  setBanner('buy-b','buy',
    buys.length?'▲ BUY SIGNAL — '+buys.map(b=>`${b.label} $${fmt(b.price)}: ${b.hits.join(' + ')}`).join(' | '):'',
    'Crypto Buy Signal Alert',
    'BUY SIGNAL DETECTED — Tony Severino Stack\n\n'+buys.map(b=>`${b.label} @ $${fmt(b.price)}\nTriggered by: ${b.hits.join(', ')}`).join('\n\n')+'\n\nTimestamp: '+new Date().toLocaleString());
  setBanner('sell-b','sell',
    sells.length?'▼ SELL SIGNAL — '+sells.map(b=>`${b.label} $${fmt(b.price)}: ${b.hits.join(' + ')}`).join(' | '):'',
    'Crypto Sell Signal Alert',
    'SELL SIGNAL DETECTED — Tony Severino Stack\n\n'+sells.map(b=>`${b.label} @ $${fmt(b.price)}\nTriggered by: ${b.hits.join(', ')}`).join('\n\n')+'\n\nTimestamp: '+new Date().toLocaleString());
  setBanner('warn-b','warn',
    warns.length&&!sells.length?'⚡ CAUTION — '+warns.join(', ')+': EW Wave 5 forming':'',
    'Crypto Wave 5 Caution','Wave 5 exhaustion forming:\n'+warns.join('\n')+'\n\nTimestamp: '+new Date().toLocaleString());
}

  if(!canvas)return;
  if(charts[id])charts[id].destroy();

  const ohlc=s.ohlc.slice(-60),n=ohlc.length;
  const bb=s.bb,fib=s.fib;
  const isBull=ohlc.map(c=>c[4]>=c[1]);
  const bodyData=ohlc.map(c=>[Math.min(c[1],c[4]),Math.max(c[1],c[4])]);
  const wickData=ohlc.map(c=>[c[3],c[2]]);
  const bColors=isBull.map(b=>b?'rgba(38,166,154,.85)':'rgba(239,83,80,.85)');
  const wColors=isBull.map(b=>b?'rgba(38,166,154,.5)':'rgba(239,83,80,.5)');
  const labels=ohlc.map((_,i)=>i%10===0?`-${n-i}h`:'');
  const allV=ohlc.flatMap(c=>[c[2],c[3]]);
  if(bb)allV.push(bb.upper,bb.lower);
  if(fib){allV.push(fib.ret[0.236],fib.ret[0.786]);FIBS_EXT.forEach(f=>allV.push(fib.ext[f]));}
  const yMin=Math.min(...allV)*.9985,yMax=Math.max(...allV)*1.0015;

  const ds=[
    {label:'Wick',data:wickData,type:'bar',backgroundColor:wColors,borderColor:'transparent',barThickness:1,order:2},
    {label:'Body',data:bodyData,type:'bar',backgroundColor:bColors,borderColor:'transparent',barThickness:6,order:1}
  ];
  if(bb){
    ds.push({label:'BBU',data:Array(n).fill(bb.upper),type:'line',borderColor:'rgba(239,83,80,.6)',borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3],order:0});
    ds.push({label:'BBM',data:Array(n).fill(bb.mid),  type:'line',borderColor:'rgba(255,152,0,.45)',borderWidth:1,pointRadius:0,fill:false,borderDash:[2,4],order:0});

  }
  if(fib){
    ds.push({label:'F382',data:Array(n).fill(fib.ret[0.382]),type:'line',borderColor:'rgba(33,150,243,.55)',borderWidth:1,pointRadius:0,fill:false,borderDash:[6,4],order:0});
    ds.push({label:'F618',data:Array(n).fill(fib.ret[0.618]),type:'line',borderColor:'rgba(156,39,176,.55)',borderWidth:1,pointRadius:0,fill:false,borderDash:[6,4],order:0});
    FIBS_EXT.forEach(f=>{
      ds.push({label:`FE${f}`,data:Array(n).fill(fib.ext[f]),type:'line',borderColor:'rgba(0,188,212,.45)',borderWidth:1,pointRadius:0,fill:false,borderDash:[3,6],order:0});
    });
  }

  charts[id]=new Chart(canvas,{
    type:'bar',data:{labels,datasets:ds},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:ctx=>`${id} — ${n-ctx[0].dataIndex}h ago`,
            label:ctx=>{if(ctx.datasetIndex!==1)return null;const c=ohlc[ctx.dataIndex];return[`O ${fmtK(c[1])}  H ${fmtK(c[2])}`,`L ${fmtK(c[3])}  C ${fmtK(c[4])}`];}
          },
          filter:item=>item.datasetIndex===1,
          backgroundColor:'rgba(30,34,45,.97)',titleColor:'#787b86',bodyColor:'#d1d4dc',
          borderColor:'#363a45',borderWidth:1,padding:10,
          titleFont:{family:'Trebuchet MS',size:10},bodyFont:{family:'Trebuchet MS',size:11}
        }
      },
      scales:{
        x:{ticks:{color:'#4c525e',font:{family:'Trebuchet MS',size:9},maxRotation:0},grid:{color:'rgba(255,255,255,.03)'},border:{color:'#2a2e39'}},
        y:{position:'right',min:yMin,max:yMax,ticks:{color:'#4c525e',font:{family:'Trebuchet MS',size:9},callback:fmtK},grid:{color:'rgba(255,255,255,.04)'},border:{color:'#2a2e39'}}
      },
      animation:false
    }
  });
}

/* ── FETCH ── */
async function fetchCandles(pairId){
  const end=new Date(),start=new Date(end-120*3600*1000); // 120h for MACD warmup
  const url=`${BASE}/products/${pairId}/candles?granularity=3600&start=${start.toISOString()}&end=${end.toISOString()}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`Candles ${pairId}: HTTP ${r.status}`);
  const data=await r.json();
  if(!Array.isArray(data)||data.length===0)throw new Error(`No data for ${pairId}`);
  const sorted=data.sort((a,b)=>a[0]-b[0]);
  const ohlc=sorted.map(c=>[c[0],c[3],c[2],c[1],c[4]]);
  return{ohlc,closes:ohlc.map(c=>c[4])};
}
async function fetchTicker(pairId){
  const r=await fetch(`${BASE}/products/${pairId}/ticker`);
  if(!r.ok)throw new Error(`Ticker ${pairId}: HTTP ${r.status}`);
  const d=await r.json();
  return{price:parseFloat(d.price),open24:parseFloat(d.open_24h||d.price)};
}
async function fetchAll(){
  document.getElementById('upd').textContent='Syncing...';
  showErr('');
  try{
    const results=await Promise.all(PAIRS.map(async({id})=>{
      const[candles,tick]=await Promise.all([fetchCandles(id),fetchTicker(id)]);
      return{id,ohlc:candles.ohlc,closes:candles.closes,price:tick.price,change:((tick.price-tick.open24)/tick.open24)*100};
    }));
    results.forEach(({id,ohlc,closes,price,change})=>{state[id]={ohlc,closes,price,change};});
    evaluate();
    PAIRS.forEach(({id,label})=>{
      const s=state[id];if(!s)return;
      const tdTag=s.td?(s.td.buySetup?' [TD9✓BUY]':s.td.sellSetup?' [TD9✓SELL]':''):'';
      if(s.anySell)      addLog(`SELL  ${label}  $${fmt(s.price)}  ${s.sellHits.join(' + ')}${tdTag}`,'sell');
      else if(s.anyBuy)  addLog(`BUY   ${label}  $${fmt(s.price)}  ${s.buyHits.join(' + ')}${tdTag}`,'sig');
      else if(s.anyWarn) addLog(`WARN  ${label}  EW W5 + ${s.sellHits.length} sell signal(s)`,'wrn');
      else               addLog(`WATCH ${label}  $${fmt(s.price)}  ${s.buyHits.length}B/${s.sellHits.length}S signals`);
    });
    document.getElementById('upd').textContent='Synced '+ts();
  }catch(e){
    showErr(e.message+' — check connection');
    addLog('ERROR: '+e.message);
    document.getElementById('upd').textContent='Error';
  }
}

document.getElementById('main-grid').innerHTML=PAIRS.map(({id,label})=>`
  <div class="panel" id="p-${id}"><div class="loading">LOADING ${label}...</div></div>`).join('');
fetchAll();
setInterval(fetchAll,60000);
</script>
</body>
</html>
